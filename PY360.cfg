; PY360.CFG - System Configuration File
; Python Mainframe Experience Layer
; Format: KEYWORD VALUE  (semicolons are comments)

; -------------------------------------------------
; SYSTEM IDENTITY
; -------------------------------------------------
SYSNAME     PY360
SYSPLEX     LOCALPLEX
NODENAME    PY360BOX

; -------------------------------------------------
; CONSOLE DEFINITION
; -------------------------------------------------
CONSOLE     COLS=80 ROWS=24

; -------------------------------------------------
; VOLUME DEFINITIONS
; SYS volume maps to datasets\SYS directory
; USR volume maps to datasets\USR directory
; -------------------------------------------------
VOLUME      VOLSER=SYSVOL TYPE=DASD PATH=datasets\SYS
VOLUME      VOLSER=USRVOL TYPE=DASD PATH=datasets\USR

; -------------------------------------------------
; I/O DEVICE DEFINITIONS
; ADDRESS  TYPE      NAME        FILE                MODE
; -------------------------------------------------
IODEVICE    ADDR=00E TYPE=PRINTER NAME=PRT001  FILE=spool\printout.txt  MODE=APPEND
IODEVICE    ADDR=00F TYPE=PUNCH   NAME=PCH001  FILE=spool\punch.txt     MODE=APPEND

; -------------------------------------------------
; SYSTEM DEFAULTS
; -------------------------------------------------
LRECL       80
RECFM       FB
BLKSIZE     800